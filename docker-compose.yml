services:
  postgres:
    image: postgres:16-alpine
    container_name: torgash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-torgash}
      POSTGRES_USER: ${DB_USER:-minecraft}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-minecraft}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-minecraft} -d ${DB_NAME:-torgash}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
